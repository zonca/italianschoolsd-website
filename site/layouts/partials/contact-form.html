<!-- Contact -->
<div class="mb4">
  <h4 class="f3 b lh-title mb3 tc">Drop us a line below</h4>

  <form name="italianschoolsd-contact" method="POST" data-netlify="true">
    <div class="flex-l mhn1-l">
      <!-- Name -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input type="text" id="name" name="name" placeholder="Name" class="w-100 mb2">
          <label for="name">Name</label>
        </fieldset>
      </div>
      <!-- Email -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input type="email" id="email" name="email" placeholder="Email" class="w-100 mb2">
          <label for="email">Email</label>
        </fieldset>
      </div>
    </div>

    <div class="flex-l mhn1-l">
      <!-- Phone -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input type="tel" id="phone" name="phone" placeholder="Phone" class="w-100 mb2">
          <label for="phone">Phone</label>
        </fieldset>
      </div>
      <!-- Preferred contact method -->
      <div class="ph1-l w-50-l">
        <fieldset class="contact-select-field">
          <label for="preferred-contact" class="contact-select-label">Preferred contact method</label>
          <select id="preferred-contact" name="preferred_contact" class="w-100 mb2">
            <option value="email">Email</option>
            <option value="phone">Phone</option>
          </select>
        </fieldset>
      </div>
    </div>

    <!-- Message -->
    <fieldset>
      <textarea id="message" name="message" placeholder="Your message" rows="8" cols="80" class="w-100"></textarea>
      <label for="message">Your message</label>
    </fieldset>
    <!-- Button -->
    <div class="tc">
      <button type="submit" class="btn w-100 w-auto-ns raise">Submit</button>
    </div>
  </form>
</div>
