<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homeschool flyer design comparison</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e9e7e0;
      color: #142c3c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; }
    header {
      max-width: 1500px;
      margin: 0 auto 24px;
    }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 42px); letter-spacing: -0.04em; }
    p { margin: 8px 0 0; color: #5d6d76; }
    main {
      display: grid;
      max-width: 1500px;
      margin: auto;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }
    figure {
      margin: 0;
      overflow: hidden;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(20, 44, 60, 0.15);
    }
    figcaption {
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    img { display: block; width: 100%; height: auto; }
    @media (max-width: 800px) {
      body { padding: 18px; }
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Homeschool flyer redesign</h1>
    <p>The original is preserved beside the regenerated flyer for direct comparison.</p>
  </header>
  <main>
    <figure>
      <figcaption>Original</figcaption>
      <img src="italianschoolsd-flyer-homeschool-2026-2027-old.png" alt="Original homeschool flyer">
    </figure>
    <figure>
      <figcaption>Redesign</figcaption>
      <img src="italianschoolsd-flyer-homeschool-2026-2027.png" alt="Redesigned homeschool flyer">
    </figure>
  </main>
</body>
</html>
